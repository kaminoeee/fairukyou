<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ファイル共有サービス「eeeBOX」</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 30px; background: #f5f7fa; color: #333; user-select: none; -webkit-user-select: none; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .section { margin-bottom: 20px; padding: 15px; border: 1px solid #e2e8f0; border-radius: 6px; background: #fafbff; }
    input[type="text"], input[type="file"], textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; }
    textarea { resize: vertical; min-height: 60px; font-family: inherit; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 20px; margin-top: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
    button:hover { background: #2563eb; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    #status { font-weight: bold; color: #475569; }
    #progressText { margin-top: 10px; color: #2563eb; font-weight: bold; font-size: 1.1em; }
    
    /* チャットエリアのスタイル */
    #chatHistory { height: 200px; overflow-y: auto; border: 1px solid #cbd5e1; background: white; padding: 10px; border-radius: 4px; margin-top: 10px; }
    .chat-msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 6px; max-width: 85%; word-break: break-all; white-space: pre-wrap; line-height: 1.4; }
    .chat-msg.me { background: #dbeafe; color: #1e40af; margin-left: auto; text-align: left; }
    .chat-msg.peer { background: #f1f5f9; color: #334155; margin-right: auto; }
    
    /* 履歴エリアのスタイル */
    #historyList { max-height: 150px; overflow-y: auto; margin-top: 10px; padding-left: 20px; }
    #historyList li { margin-bottom: 5px; font-size: 0.9em; color: #475569; }
  </style>
</head>
<body>

<div class="container">
  <h2>eeeBOX</h2>
  <p style="font-size: 0.9em; color: #64748b;">※トラブルや切断時は自動で最初の画面に戻ります。</p>

  <div class="section" style="text-align: center; background: #fff8e1; border: 1px solid #ffe082; padding: 15px; border-radius: 6px; margin-bottom: 15px;">
    <p style="margin: 0 0 10px 0; font-size: 0.9rem; color: #e65100; font-weight: bold;">🎁 開発者を応援する（匿名で送れます）</p>
    <p style="margin: 0 0 12px 0; font-size: 0.8rem; color: #666; line-height: 1.4;">
      サイトを気に入ったら、Amazonギフトカード（15円〜）でジュースをおごっていただけると励みになります！<br>
      宛先メールアドレス：<strong id="target-email" style="color: #007bff; background: #fff; padding: 2px 5px; border: 1px solid #ccc; border-radius: 3px; cursor: pointer;" title="クリックでコピー">kaminoeee@gmail.com</strong>
    </p>
    <button id="amajif-btn" style="background: #ff9900; color: white; margin-top: 0;">
      アドレスをコピーしてAmazonを開く ↗
    </button>
  </div>

  <div class="section" id="loginSection">
    <label for="roomIdInput">部屋番号を入力：</label>
    <input type="text" id="roomIdInput" placeholder="例: room999">
    <button id="connectBtn">入室・接続する</button>
  </div>

  <div class="section">
    <h3>現在のステータス</h3>
    <p id="status">状態: 準備完了（部屋番号を入力してください）</p>
  </div>

  <div class="section" id="shareSection" style="display:none;">
    <h3>ファイルを送信</h3>
    <input type="file" id="fileInput">
    <button id="sendBtn">送信を開始</button>
  </div>

  <div class="section" id="chatSection" style="display:none;">
    <h3>リアルタイムチャット</h3>
    <p style="font-size: 0.8em; color: #64748b; margin: 0;">※Enterで送信、Shift+Enterで改行します</p>
    <div id="chatHistory"></div>
    <textarea id="chatInput" placeholder="メッセージを入力..."></textarea>
    <button id="chatSendBtn" style="background: #10b981;">メッセージ送信</button>
  </div>

  <div class="section" id="progressSection" style="display:none;">
    <h3>送受信の進捗</h3>
    <p id="progressText">待機中...</p>
  </div>

  <div class="section" id="historySection" style="display:none;">
    <h3>送受信履歴</h3>
    <ul id="historyList"></ul>
  </div>
</div>

<script>

  document.addEventListener('contextmenu', (e) => e.preventDefault());
  document.addEventListener('keydown', (e) => {
    if (e.key === 'F12' || 
       (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) || 
       (e.ctrlKey && (e.key === 'U' || e.key === 'u')) || 
       (e.ctrlKey && (e.key === 'S' || e.key === 's'))) {
      e.preventDefault();
      return false;
    }
  });


  const emailElem = document.getElementById('target-email');
  const amajifBtn = document.getElementById('amajif-btn');
  const emailText = "kaminoeee@gmail.com";

  function copyAndOpenAmazon() {
    navigator.clipboard.writeText(emailText).then(() => {
      alert("メールアドレスをコピーしました！Amazonのページを開きます。");
      window.open("https://www.amazon.co.jp/dp/B004N3APRE", "_blank");
    }).catch(() => {
      alert("コピーに失敗しました。手動でコピーしてください: " + emailText);
    });
  }
  emailElem.onclick = copyAndOpenAmazon;
  amajifBtn.onclick = copyAndOpenAmazon;


  let peer = null;
  let conn = null;
  const CHUNK_SIZE = 16384; // 16KB

  const loginSection = document.getElementById('loginSection');
  const connectBtn = document.getElementById('connectBtn');
  const roomIdInput = document.getElementById('roomIdInput');
  const statusText = document.getElementById('status');
  const shareSection = document.getElementById('shareSection');
  const progressSection = document.getElementById('progressSection');
  const fileInput = document.getElementById('fileInput');
  const sendBtn = document.getElementById('sendBtn');
  const progressText = document.getElementById('progressText');
  
  // 新規要素
  const chatSection = document.getElementById('chatSection');
  const chatHistory = document.getElementById('chatHistory');
  const chatInput = document.getElementById('chatInput');
  const chatSendBtn = document.getElementById('chatSendBtn');
  const historySection = document.getElementById('historySection');
  const historyList = document.getElementById('historyList');

  // 【核心】すべてを完全に初期化する関数
  function resetSystem(message) {
    console.log("初期化発火:", message);
    
    if (conn) { 
      try { conn.close(); } catch(e){} 
      conn = null; 
    }
    if (peer) { 
      try { peer.destroy(); } catch(e){} 
      peer = null; 
    }

    // 画面を最初期状態に戻す
    loginSection.style.display = 'block';
    shareSection.style.display = 'none';
    chatSection.style.display = 'none';
    progressSection.style.display = 'none';
    connectBtn.disabled = false;
    roomIdInput.disabled = false;
    fileInput.value = ""; 
    sendBtn.disabled = false;
    
    statusText.innerText = "状態: " + (message || "初期化されました。再度入室してください。");
    progressText.innerText = "待機中...";
  }

  connectBtn.onclick = function() {
    const roomId = roomIdInput.value.trim();
    if (!roomId) return alert('部屋番号を入力してください');

    connectBtn.disabled = true;
    roomIdInput.disabled = true;
    statusText.innerText = 'シグナリングサーバーに接続中...';

    peer = new Peer(roomId, { debug: 1 });

    peer.on('open', () => {
      statusText.innerText = `部屋（${roomId}）を作成しました。相手の入室を待っています...`;
    });

    peer.on('connection', (connection) => {
      if (conn) return; 
      conn = connection;
      setupConnection();
    });

    peer.on('error', (err) => {
      if (err.type === 'unavailable-id') {
        statusText.innerText = '先客を検知しました。ゲストとして入室します...';
        
        peer = new Peer({ debug: 1 });
        peer.on('open', () => {
          conn = peer.connect(roomId, { reliable: true });
          setupConnection();
        });
        
        peer.on('error', (gErr) => {
          resetSystem('接続に失敗しました。時間をおいてやり直してください。');
        });
      } else {
        resetSystem('切断またはエラーが起きたため初期化しました。');
      }
    });
  };

  function addHistory(type, name, size) {
    historySection.style.display = 'block';
    const li = document.createElement('li');
    const now = new Date();
    const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
    li.innerText = `[${timeStr}] 【${type}】 ${name} (${(size/1024/1024).toFixed(2)} MB)`;
    historyList.appendChild(li);
    historyList.scrollTop = historyList.scrollHeight;
  }

  function appendChatMessage(sender, text) {
    const msgDiv = document.createElement('div');
    msgDiv.classList.add('chat-msg', sender);
    msgDiv.textContent = text; // textContentを使うことでHTMLタグを無効化（安全対策）
    chatHistory.appendChild(msgDiv);
    chatHistory.scrollTop = chatHistory.scrollHeight;
  }

  function sendChatMessage() {
    const text = chatInput.value;
    if (!text.replace(/\s/g, '') || !conn) return; 

    conn.send({ type: 'chat-text', message: text });
    appendChatMessage('me', text);
    chatInput.value = '';
  }

  // ボタンクリック送信
  chatSendBtn.onclick = sendChatMessage;

  // Enterで送信、Shift+Enterで改行
  chatInput.onkeydown = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault(); // 本来の改行動作を止める
      sendChatMessage();
    }
  };

  function setupConnection() {
    conn.on('close', () => {
      resetSystem('回線が切断されたか、相手が退出したため初期化しました。');
    });
    conn.on('error', (err) => {
      resetSystem('通信エラーが発生したため初期化しました。');
    });

    conn.on('open', () => {
      statusText.innerText = 'ステータス: 同期中...';
      conn.send({ type: 'system-ping' });
    });

    let receivedChunks = [];
    let fileMeta = null;
    let receivedSize = 0;

    conn.on('data', (data) => {
      if (data && data.type === 'system-ping') {
        loginSection.style.display = 'none';
        shareSection.style.display = 'block';
        chatSection.style.display = 'block'; // チャット表示
        progressSection.style.display = 'block';
        statusText.innerText = 'ステータス: 双方向P2P接続完了！';
        progressText.innerText = '接続されました。ファイルを送信するか、相手からの送信を待ってください。';
        return;
      }

      // チャットテキストの受信処理
      if (data && data.type === 'chat-text') {
        appendChatMessage('peer', data.message);
        return;
      }

      if (data && data.type === 'meta') {
        fileMeta = data.info;
        receivedChunks = [];
        receivedSize = 0;
        progressText.innerText = `受信開始: ${fileMeta.name} (0%)`;
        return;
      }

      if (data === '===EOF===') {
        progressText.innerText = 'ファイルを組み立て中...';
        
        setTimeout(() => {
          try {
            const blob = new Blob(receivedChunks, { type: fileMeta.type || 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = fileMeta.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            progressText.innerText = `受信完了: ${fileMeta.name}`;
            addHistory('受信', fileMeta.name, fileMeta.size); // 履歴追加
            receivedChunks = [];
            URL.revokeObjectURL(url);
          } catch(e) {
            progressText.innerText = 'エラー: ブラウザのメモリ上限を超えました。';
          }
        }, 100);
        return;
      }

      receivedChunks.push(data);
      receivedSize += data.byteLength || data.size || 0;
      
      if (fileMeta) {
        const progress = ((receivedSize / fileMeta.size) * 100).toFixed(1);
        progressText.innerText = `受信中: ${progress}% (${(receivedSize/1024/1024).toFixed(1)}MB / ${(fileMeta.size/1024/1024).toFixed(1)}MB)`;
      }
    });
  }

  sendBtn.addEventListener('click', () => {
    const file = fileInput.files[0];
    if (!file || !conn) return alert('ファイルを選択してください');

    sendBtn.disabled = true;
    let offset = 0;
    const reader = new FileReader();

    conn.send({
      type: 'meta',
      info: { name: file.name, size: file.size, type: file.type }
    });

    reader.onload = function(e) {
      if (!conn) return; 
      
      conn.send(e.target.result);
      offset += e.target.result.byteLength;
      
      const progress = ((offset / file.size) * 100).toFixed(1);
      progressText.innerText = `送信中: ${progress}%`;

      if (offset < file.size) {
        if (offset % (CHUNK_SIZE * 20) === 0) {
          setTimeout(readNextChunk, 1);
        } else {
          readNextChunk();
        }
      } else {
        setTimeout(() => {
          if (conn) conn.send('===EOF===');
          progressText.innerText = '送信完了しました！';
          addHistory('送信', file.name, file.size); // 履歴追加
          sendBtn.disabled = false;
        }, 500);
      }
    };

    function readNextChunk() {
      if (!conn) return;
      const slice = file.slice(offset, offset + CHUNK_SIZE);
      reader.readAsArrayBuffer(slice);
    }

    readNextChunk();
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>P2Pファイル共有</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 30px; background: #f5f7fa; color: #333; user-select: none; -webkit-user-select: none; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .section { margin-bottom: 20px; padding: 15px; border: 1px solid #e2e8f0; border-radius: 6px; background: #fafbff; }
    input[type="text"], input[type="file"] { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 20px; margin-top: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
    button:hover { background: #2563eb; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    #status { font-weight: bold; color: #475569; }
    #progressText { margin-top: 10px; color: #2563eb; font-weight: bold; font-size: 1.1em; }
  </style>
</head>
<body>

<div class="container">
  <h2>P2Pファイル共有</h2>
  <p style="font-size: 0.9em; color: #64748b;">※トラブルや切断時は自動で最初の画面に戻ります。</p>

  <div class="section" id="loginSection">
    <label for="roomIdInput">部屋番号を入力：</label>
    <input type="text" id="roomIdInput" placeholder="例: room999">
    <button id="connectBtn">入室・接続する</button>
  </div>

  <div class="section">
    <h3>現在のステータス</h3>
    <p id="status">状態: 準備完了（部屋番号を入力してください）</p>
  </div>

  <div class="section" id="shareSection" style="display:none;">
    <h3>ファイルを送信</h3>
    <input type="file" id="fileInput">
    <button id="sendBtn">送信を開始</button>
  </div>

  <div class="section" id="progressSection" style="display:none;">
    <h3>送受信の進捗</h3>
    <p id="progressText">待機中...</p>
  </div>
</div>

<script>
  // ==========================================
  // 【お守り】ソースコード表示・コピー対策
  // ==========================================
  document.addEventListener('contextmenu', (e) => e.preventDefault());
  document.addEventListener('keydown', (e) => {
    if (e.key === 'F12' || 
       (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) || 
       (e.ctrlKey && (e.key === 'U' || e.key === 'u')) || 
       (e.ctrlKey && (e.key === 'S' || e.key === 's'))) {
      e.preventDefault();
      return false;
    }
  });

  // ==========================================
  // P2P 安定化＆自動初期化ロジック
  // ==========================================
  let peer = null;
  let conn = null;
  const CHUNK_SIZE = 16384; // 16KB

  const loginSection = document.getElementById('loginSection');
  const connectBtn = document.getElementById('connectBtn');
  const roomIdInput = document.getElementById('roomIdInput');
  const statusText = document.getElementById('status');
  const shareSection = document.getElementById('shareSection');
  const progressSection = document.getElementById('progressSection');
  const fileInput = document.getElementById('fileInput');
  const sendBtn = document.getElementById('sendBtn');
  const progressText = document.getElementById('progressText');

  // 【核心】すべてを完全に初期化する関数
  function resetSystem(message) {
    console.log("初期化発火:", message);
    
    // 通信オブジェクトを確実にキル
    if (conn) { 
      try { conn.close(); } catch(e){} 
      conn = null; 
    }
    if (peer) { 
      try { peer.destroy(); } catch(e){} 
      peer = null; 
    }

    // 画面を最初期状態に戻す
    loginSection.style.display = 'block';
    shareSection.style.display = 'none';
    progressSection.style.display = 'none';
    connectBtn.disabled = false;
    roomIdInput.disabled = false;
    fileInput.value = ""; 
    sendBtn.disabled = false;
    
    statusText.innerText = "状態: " + (message || "初期化されました。再度入室してください。");
    progressText.innerText = "待機中...";
  }

  connectBtn.onclick = function() {
    const roomId = roomIdInput.value.trim();
    if (!roomId) return alert('部屋番号を入力してください');

    connectBtn.disabled = true;
    roomIdInput.disabled = true;
    statusText.innerText = 'シグナリングサーバーに接続中...';

    // 自分がホスト（部屋作成者）として起動
    peer = new Peer(roomId, { debug: 1 });

    peer.on('open', () => {
      statusText.innerText = `部屋（${roomId}）を作成しました。相手の入室を待っています...`;
    });

    // 相手が入ってきたとき
    peer.on('connection', (connection) => {
      if (conn) return; 
      conn = connection;
      setupConnection();
    });

    // 部屋が既にあった（先客がいた）場合はゲストとして入り直す
    peer.on('error', (err) => {
      if (err.type === 'unavailable-id') {
        statusText.innerText = '先客を検知しました。ゲストとして入室します...';
        
        peer = new Peer({ debug: 1 });
        peer.on('open', () => {
          conn = peer.connect(roomId, { reliable: true });
          setupConnection();
        });
        
        peer.on('error', (gErr) => {
          resetSystem('接続に失敗しました。時間をおいてやり直してください。');
        });
      } else {
        resetSystem('切断またはエラーが起きたため初期化しました。');
      }
    });
  };

  function setupConnection() {
    // 【重要】回線落ち・切断・離脱を検知したら即リセット
    conn.on('close', () => {
      resetSystem('回線が切断されたか、相手が退出したため初期化しました。');
    });
    conn.on('error', (err) => {
      resetSystem('通信エラーが発生したため初期化しました。');
    });

    conn.on('open', () => {
      statusText.innerText = 'ステータス: 同期中...';
      // 相互接続を確定させるための合図
      conn.send({ type: 'system-ping' });
    });

    let receivedChunks = [];
    let fileMeta = null;
    let receivedSize = 0;

    conn.on('data', (data) => {
      // 接続同期シグナルの処理
      if (data && data.type === 'system-ping') {
        loginSection.style.display = 'none';
        shareSection.style.display = 'block';
        progressSection.style.display = 'block';
        statusText.innerText = 'ステータス: 双方向P2P接続完了！';
        progressText.innerText = '接続されました。ファイルを送信するか、相手からの送信を待ってください。';
        return;
      }

      // ファイル情報受信
      if (data && data.type === 'meta') {
        fileMeta = data.info;
        receivedChunks = [];
        receivedSize = 0;
        progressText.innerText = `受信開始: ${fileMeta.name} (0%)`;
        return;
      }

      // ファイル送信完了
      if (data === '===EOF===') {
        progressText.innerText = 'ファイルを組み立て中...';
        
        setTimeout(() => {
          try {
            const blob = new Blob(receivedChunks, { type: fileMeta.type || 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = fileMeta.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            progressText.innerText = `受信完了: ${fileMeta.name}`;
            receivedChunks = [];
            URL.revokeObjectURL(url);
          } catch(e) {
            progressText.innerText = 'エラー: ブラウザのメモリ上限を超えました。';
          }
        }, 100);
        return;
      }

      // 破片を蓄積
      receivedChunks.push(data);
      receivedSize += data.byteLength || data.size || 0;
      
      if (fileMeta) {
        const progress = ((receivedSize / fileMeta.size) * 100).toFixed(1);
        progressText.innerText = `受信中: ${progress}% (${(receivedSize/1024/1024).toFixed(1)}MB / ${(fileMeta.size/1024/1024).toFixed(1)}MB)`;
      }
    });
  }

  // 送信処理
  sendBtn.addEventListener('click', () => {
    const file = fileInput.files[0];
    if (!file || !conn) return alert('ファイルを選択してください');

    sendBtn.disabled = true;
    let offset = 0;
    const reader = new FileReader();

    conn.send({
      type: 'meta',
      info: { name: file.name, size: file.size, type: file.type }
    });

    reader.onload = function(e) {
      if (!conn) return; 
      
      conn.send(e.target.result);
      offset += e.target.result.byteLength;
      
      const progress = ((offset / file.size) * 100).toFixed(1);
      progressText.innerText = `送信中: ${progress}%`;

      if (offset < file.size) {
        if (offset % (CHUNK_SIZE * 20) === 0) {
          setTimeout(readNextChunk, 1);
        } else {
          readNextChunk();
        }
      } else {
        setTimeout(() => {
          if (conn) conn.send('===EOF===');
          progressText.innerText = '送信完了しました！';
          sendBtn.disabled = false;
        }, 500);
      }
    };

    function readNextChunk() {
      if (!conn) return;
      const slice = file.slice(offset, offset + CHUNK_SIZE);
      reader.readAsArrayBuffer(slice);
    }

    readNextChunk();
  });
</script>

</body>
</html>
